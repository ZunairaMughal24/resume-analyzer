name: resume_analyzer
description: AI-Powered Resume Analyzer using Gemini
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking (calls Gemini API)
  http: ^1.1.0
  google_generative_ai: ^0.4.6 

  # File Picking
  file_picker: ^11.0.2

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.65.0
  dotted_border: ^2.1.0

  # Utils
  dartz: ^0.10.1
  flutter_dotenv: ^5.1.0
  syncfusion_flutter_pdf: ^33.2.3
  syncfusion_flutter_pdfviewer: ^33.2.3
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
